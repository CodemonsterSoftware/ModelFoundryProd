<style>
    .wizard-stepper-container {
        margin-bottom: 2rem;
        padding: 1rem 0;
    }
    .wizard-stepper {
        display: flex;
        justify-content: space-between;
        position: relative;
        max-width: 800px;
        margin: 0 auto;
    }
    .wizard-stepper::before {
        content: '';
        position: absolute;
        top: 24px;
        left: 15%;
        right: 15%;
        height: 2px;
        background: rgba(255, 255, 255, 0.1);
        z-index: 0;
    }
    /* Progress Line */
    .wizard-progress-line {
        position: absolute;
        top: 24px;
        left: 15%;
        height: 2px;
        background: var(--primary-color);
        z-index: 0;
        transition: width 0.5s ease;
    }
    .wizard-step {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        width: 33.33%;
    }
    .wizard-step-circle {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-darker);
        border: 2px solid rgba(255, 255, 255, 0.1);
        color: var(--text-muted);
        font-size: 1.2rem;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
    }
    .wizard-step-label {
        font-size: 0.9rem;
        color: var(--text-muted);
        font-weight: 500;
        text-align: center;
        transition: all 0.3s ease;
    }
    
    /* Active Step */
    .wizard-step.active .wizard-step-circle {
        border-color: var(--primary-color);
        background: rgba(13, 110, 253, 0.15);
        color: var(--primary-color);
        box-shadow: 0 0 20px rgba(13, 110, 253, 0.3);
    }
    .wizard-step.active .wizard-step-label {
        color: var(--text-light);
        font-weight: 600;
    }
    
    /* Completed Step */
    .wizard-step.completed .wizard-step-circle {
        border-color: #10b981;
        background: rgba(16, 185, 129, 0.15);
        color: #10b981;
        box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
    }
    .wizard-step.completed .wizard-step-label {
        color: #10b981;
    }
</style>

<div class="wizard-stepper-container">
    <div class="wizard-stepper">
        <div class="wizard-progress-line" style="width: {% if current_step == 1 %}0%{% elif current_step == 2 %}35%{% else %}70%{% endif %};"></div>
        
        <!-- Step 1: Project Details -->
        <div class="wizard-step {% if current_step == 1 %}active{% elif current_step > 1 %}completed{% endif %}">
            <div class="wizard-step-circle">
                {% if current_step > 1 %}<i class="fas fa-check"></i>{% else %}<i class="fas fa-pencil-alt"></i>{% endif %}
            </div>
            <div class="wizard-step-label">Project Details</div>
        </div>
        
        <!-- Step 2: Add Parts -->
        <div class="wizard-step {% if current_step == 2 %}active{% elif current_step > 2 %}completed{% endif %}">
            <div class="wizard-step-circle">
                {% if current_step > 2 %}<i class="fas fa-check"></i>{% else %}<i class="fas fa-cubes"></i>{% endif %}
            </div>
            <div class="wizard-step-label">Upload Parts</div>
        </div>
        
        <!-- Step 3: Instructions -->
        <div class="wizard-step {% if current_step == 3 %}active{% endif %}">
            <div class="wizard-step-circle">
                <i class="fas fa-list-ol"></i>
            </div>
            <div class="wizard-step-label">Assembly Instructions</div>
        </div>
    </div>
</div>
